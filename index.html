<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API Console</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f0a; --bg2: #111811; --bg3: #181f17;
      --border: rgba(74,222,128,0.15); --border-hover: rgba(74,222,128,0.4);
      --green: #4ade80; --green-dim: #22c55e;
      --text: #e2e8e2; --text-dim: #6b7f6b; --text-muted: #3a4a3a;
      --mono: 'JetBrains Mono', monospace; --display: 'Unbounded', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--mono); font-size: 13px; line-height: 1.6;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
      background-size: 32px 32px; pointer-events: none; z-index: 0;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; position: relative; z-index: 1; }
    header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 3rem; padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 40px; height: 40px; background: var(--green);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-text h1 { font-family: var(--display); font-size: 16px; font-weight: 600; color: var(--green); }
    .header-text p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .status-dot { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .section-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
      transition: border-color 0.2s; animation: fadeUp 0.4s ease both;
    }
    .card:hover { border-color: var(--border-hover); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .creds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .send-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 12px; }
    .url-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media(max-width:600px){.creds-grid,.send-grid,.url-grid{grid-template-columns:1fr}}
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
    input {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 12px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
    }
    input:focus { border-color: var(--green-dim); box-shadow: 0 0 0 3px rgba(74,222,128,0.08); }
    input::placeholder { color: var(--text-muted); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0; }
    button {
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--green); cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    button:hover { background: rgba(74,222,128,0.08); border-color: var(--green-dim); box-shadow: 0 0 12px rgba(74,222,128,0.1); }
    button:active { transform: scale(0.97); }
    button.loading { opacity: 0.6; pointer-events: none; }
    .response-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .method-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .copy-btn { font-size: 10px; padding: 3px 8px; color: var(--text-dim); border-color: var(--border); background: transparent; }
    .copy-btn:hover { color: var(--green); }
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; color: var(--green-dim);
      font-family: var(--mono); font-size: 11px; line-height: 1.7;
      resize: vertical; min-height: 160px; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--border-hover); }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(74,222,128,0.3); border-top-color: var(--green); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    footer span { font-size: 10px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#0a0f0a" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4C2.9 2 2 2.9 2 4v16l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H5.17L4 15.17V4h16v10z"/>
        <circle cx="8" cy="9" r="1.5"/><circle cx="12" cy="9" r="1.5"/><circle cx="16" cy="9" r="1.5"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>GREEN-API Console</h1>
      <p>WhatsApp API — тестовый интерфейс</p>
    </div>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">не подключено</span>
    </div>
  </header>

  <!-- Credentials + Info methods -->
  <div class="section-label">// подключение к инстансу</div>
  <div class="card">
    <div class="creds-grid">
      <div class="field-group">
        <label>idInstance</label>
        <input type="text" id="idInstance" placeholder="1234567890" />
      </div>
      <div class="field-group">
        <label>ApiTokenInstance</label>
        <input type="password" id="apiToken" placeholder="••••••••••••••••••••••" />
      </div>
    </div>
    <div class="btn-row">
      <button onclick="callGetSettings(event)"><span>⚙</span> getSettings</button>
      <button onclick="callGetStateInstance(event)"><span>◎</span> getStateInstance</button>
    </div>
  </div>

  <!-- sendMessage -->
  <div class="section-label">// отправка сообщения</div>
  <div class="card">
    <div class="send-grid">
      <div class="field-group">
        <label>Номер телефона</label>
        <input type="text" id="phoneNumber" placeholder="79001234567" />
      </div>
      <div class="field-group">
        <label>Текст сообщения</label>
        <input type="text" id="messageText" placeholder="Привет! Тестовое сообщение." />
      </div>
    </div>
    <div class="btn-row">
      <button onclick="callSendMessage(event)"><span>→</span> sendMessage</button>
    </div>
  </div>

  <!-- sendFileByUrl -->
  <div class="section-label">// отправка файла по URL</div>
  <div class="card">
    <div class="url-grid">
      <div class="field-group">
        <label>Номер телефона</label>
        <input type="text" id="filePhone" placeholder="79001234567" />
      </div>
      <div class="field-group">
        <label>URL файла</label>
        <input type="text" id="fileUrl" placeholder="https://example.com/file.pdf" />
      </div>
      <div class="field-group">
        <label>Имя файла</label>
        <input type="text" id="fileName" placeholder="document.pdf" />
      </div>
    </div>
    <div class="btn-row">
      <button onclick="callSendFileByUrl(event)"><span>↑</span> sendFileByUrl</button>
    </div>
  </div>

  <!-- Response -->
  <div class="section-label">// ответ метода</div>
  <div class="card">
    <div class="response-label">
      <span class="method-tag" id="activeMethod">— нет вызовов —</span>
      <button class="copy-btn" onclick="copyResponse()">копировать</button>
    </div>
    <textarea id="globalResponse" readonly placeholder="Здесь появится ответ API..."></textarea>
  </div>

  <footer>
    <span>GREEN-API Console · тестовое задание</span>
    <span>WhatsApp Business API</span>
  </footer>

</div>
<script>
  const BASE = 'https://api.green-api.com';
  const getId    = () => document.getElementById('idInstance').value.trim();
  const getToken = () => document.getElementById('apiToken').value.trim();

  function showResponse(method, data) {
    document.getElementById('activeMethod').textContent = method;
    document.getElementById('globalResponse').value = JSON.stringify(data, null, 2);
  }

  function setLoading(btn, on) {
    if (on) { btn._orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> запрос...'; btn.classList.add('loading'); }
    else { btn.innerHTML = btn._orig; btn.classList.remove('loading'); }
  }

  function updateStatus(state) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (state === 'authorized') { dot.classList.add('connected'); txt.textContent = 'подключено'; }
    else { dot.classList.remove('connected'); txt.textContent = state || 'не подключено'; }
  }

  async function apiCall(method, path, body = null) {
    const id = getId(), token = getToken();
    if (!id || !token) { showResponse(method, { error: 'Введите idInstance и ApiTokenInstance' }); return null; }
    const url  = `${BASE}/waInstance${id}/${path}/${token}`;
    const opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
  }

  async function callGetSettings(e) {
    const btn = e.currentTarget; setLoading(btn, true);
    try { const d = await apiCall('getSettings','getSettings'); if(d) showResponse('getSettings', d); }
    catch(err) { showResponse('getSettings — ошибка', { error: err.message }); }
    setLoading(btn, false);
  }

  async function callGetStateInstance(e) {
    const btn = e.currentTarget; setLoading(btn, true);
    try {
      const d = await apiCall('getStateInstance','getStateInstance');
      if(d) { showResponse('getStateInstance', d); if(d.stateInstance) updateStatus(d.stateInstance); }
    } catch(err) { showResponse('getStateInstance — ошибка', { error: err.message }); }
    setLoading(btn, false);
  }

  async function callSendMessage(e) {
    const btn = e.currentTarget;
    const phone = document.getElementById('phoneNumber').value.trim();
    const text  = document.getElementById('messageText').value.trim();
    if (!phone || !text) { showResponse('sendMessage', { error: 'Введите номер и текст' }); return; }
    setLoading(btn, true);
    try {
      const d = await apiCall('sendMessage','sendMessage', { chatId: phone+'@c.us', message: text });
      if(d) showResponse('sendMessage', d);
    } catch(err) { showResponse('sendMessage — ошибка', { error: err.message }); }
    setLoading(btn, false);
  }

  async function callSendFileByUrl(e) {
    const btn = e.currentTarget;
    const phone = document.getElementById('filePhone').value.trim();
    const url   = document.getElementById('fileUrl').value.trim();
    const name  = document.getElementById('fileName').value.trim();
    if (!phone || !url || !name) { showResponse('sendFileByUrl', { error: 'Заполните все поля' }); return; }
    setLoading(btn, true);
    try {
      const d = await apiCall('sendFileByUrl','sendFileByUrl', { chatId: phone+'@c.us', urlFile: url, fileName: name });
      if(d) showResponse('sendFileByUrl', d);
    } catch(err) { showResponse('sendFileByUrl — ошибка', { error: err.message }); }
    setLoading(btn, false);
  }

  function copyResponse() {
    const val = document.getElementById('globalResponse').value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.querySelector('.copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'скопировано ✓';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
</script>
</body>
</html>
